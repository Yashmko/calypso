version: '3.8'
services:
  calypso:
    build: .
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - investigations_data:/app/investigations.db
      # Mount Coral CLI config if available locally
      - ~/.coral:/root/.coral

volumes:
  investigations_data: